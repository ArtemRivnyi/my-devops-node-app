# .github/workflows/docker-build.yml

# Название рабочего процесса, которое будет отображаться в интерфейсе GitHub Actions.
name: CI/CD Pipeline

# Определяет, когда этот рабочий процесс будет запускаться.
on:
  # Запускать при каждом push в ветку 'main'.
  push:
    branches: [ main ]
  # Запускать при открытии PR в ветку 'main'.
  pull_request:
    branches: [ main ]
  # Запускать вручную из интерфейса GitHub Actions.
  workflow_dispatch:

# Задачи (jobs), которые будут выполняться в рамках этого рабочего процесса.
jobs:
  # Задача 1: Тестирование
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Run tests with coverage
      run: npm test
      env:
        NODE_OPTIONS: '--experimental-vm-modules'

  # Задача 2: Сборка и публикация Docker-образа
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/node-devops-boilerplate:latest

